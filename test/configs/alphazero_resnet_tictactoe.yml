name: "_test_alphazero_resnet"

common:
  plot_interval: 4
  info_interval: 4
  eval_graph_split: 100
  checkpoint_interval: 3

env:
  name: "tictactoe"
  obs_space_format: "channels_last"
  kwargs: {}

network:
  architecture: "ResNet"
  num_filters: 8
  num_blocks: 2
  hex: false

backend:
  name: "alphazoo"
  continue_training: false
  algorithm:
    name: "alphazero"
    config:
      verbose: false
      running:
        running_mode: "sequential"
        num_gamers: 3
        training_steps: 8
        sequential:
          num_games_per_step: 4
      data:
        player_dependent_value: true
      cache:
        enabled: true
        max_size: 500
      learning:
        learning_method: "samples"
        replay_buffer:
          window_size: 300
          leak_chance: 0.0
          reanalyse:
            enabled: true
            num_workers: 2
            positions_per_step: 1
            min_buffer_fill_ratio: 0.0
            search:
              simulation:
                mcts_simulations: 8
                keep_subtree: false
        value_loss: "SE"
        policy_loss: "CE"
        samples:
          batch_size: 16
          num_samples: 16
      search:
        simulation:
          mcts_simulations: 8
          keep_subtree: false
        uct:
          pb_c_base: 10000
          pb_c_init: 1.15
        exploration:
          number_of_softmax_moves: 3
          epsilon_softmax_exploration: 0.04
          epsilon_random_exploration: 0.0
          value_factor: 1.0
          root_exploration_distribution: "dirichlet"
          root_exploration_fraction: 0.25
          root_dist_alpha: 0.3
      optimizer:
        optimizer_choice: "Adam"
      scheduler:
        starting_lr: 0.001
        boundaries: [1000]
        gamma: 0.1

evaluation:
  training_eval:
    - player: alphazero_mcts
      opponent: random
      games_per_player: 3
      interval: 4
      search_config_path: "test/configs/search_test.yml"
  checkpoint_eval:
    - player: policy
      opponent: alphazero_mcts
      games_per_player: 3
      search_config_path: "test/configs/search_test.yml"
