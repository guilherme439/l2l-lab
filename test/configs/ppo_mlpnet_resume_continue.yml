name: "_test_ppo_mlpnet_resume"

common:
  plot_interval: 3
  info_interval: 5
  eval_graph_split: 100
  checkpoint_interval: 4

env:
  name: "tictactoe"
  obs_space_format: "channels_last"
  kwargs: {}

network:
  architecture: "MLPNet"
  hidden_layers: 2
  neurons_per_layer: 16
  policy_head:
    name: "linear_reduce"
    num_layers: 1
  value_head:
    name: "linear_reduce"
    num_layers: 1

backend:
  name: "rllib"
  continue_training: true
  algorithm:
    name: "ppo"
    iterations: 10
    config:
      use_curiosity: false
      num_env_runners: 0
      rollout_fragment_length: 32
      train_batch_size_per_learner: 128
      minibatch_size: 32
      num_epochs: 2
      lr: 0.0005
      gamma: 0.995
      entropy_coeff: 0.005
      vf_loss_coeff: 0.8
      clip_param: 0.15
      use_kl_loss: true
      kl_coeff: 0.1
      kl_target: 0.02
      policy:
        use_multiple_policies: false

evaluation:
  training_eval:
    - player: policy
      opponent: random
      games_per_player: 1
      interval: 2
  checkpoint_eval: []
