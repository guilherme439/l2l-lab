name: "_test_alphazero_snnet_resume"

common:
  plot_interval: 2
  info_interval: 5
  eval_graph_split: 7
  checkpoint_interval: 3

env:
  name: "tictactoe"
  obs_space_format: "channels_last"
  kwargs: {}

network:
  architecture: "SNNet"
  hidden_layers: 2
  neurons_per_layer: 16
  head_layers: 1
  dropout: 0.0

backend:
  name: "alphazoo"
  continue_training: true
  algorithm:
    name: "alphazero"
    config:
      verbose: false
      running:
        running_mode: "sequential"
        num_gamers: 3
        training_steps: 8
        sequential:
          num_games_per_step: 3
      data:
        player_dependent_value: true
      cache:
        enabled: true
        max_size: 500
      learning:
        learning_method: "epochs"
        replay_buffer:
          window_size: 300
          leak_chance: 0.0
        value_loss: "SE"
        policy_loss: "CE"
        epochs:
          batch_size: 32
          learning_epochs: 1
      search:
        simulation:
          mcts_simulations: 8
          keep_subtree: false
        uct:
          pb_c_base: 10000
          pb_c_init: 1.15
        exploration:
          number_of_softmax_moves: 3
          epsilon_softmax_exploration: 0.04
          epsilon_random_exploration: 0.0
          value_factor: 1.0
          root_exploration_distribution: "dirichlet"
          root_exploration_fraction: 0.25
          root_dist_alpha: 0.3
      optimizer:
        optimizer_choice: "SGD"
      scheduler:
        starting_lr: 0.01
        boundaries: [1000]
        gamma: 0.1

evaluation:
  training_eval:
    - player: policy
      opponent: random
      games_per_player: 2
      interval: 2
  checkpoint_eval: []
