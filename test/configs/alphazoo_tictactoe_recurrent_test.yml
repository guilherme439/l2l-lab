name: "_test_alphazoo_tictactoe_recurrent"

common:
  plot_interval: 1000
  info_interval: 1000
  eval_graph_split: 100
  checkpoint_interval: 4

env:
  name: "tictactoe"
  obs_space_format: "channels_last"
  kwargs: {}

network:
  architecture: "RecurrentNet"
  num_filters: 8
  num_blocks: 1
  recall: true
  hex: false

backend:
  name: "alphazoo"
  continue_training: false
  algorithm:
    name: "alphazero"
    config:
      verbose: false
      running:
        running_mode: "sequential"
        num_gamers: 1
        training_steps: 8
        early_fill_games: 2
        sequential:
          num_games_per_step: 2
      data:
        player_dependent_value: true
      cache:
        enabled: false
      recurrent:
        train_iterations: 2
        pred_iterations: 2
        use_progressive_loss: true
        prog_alpha: 0.5
      learning:
        learning_method: "epochs"
        replay_window_size: 200
        value_loss: "SE"
        policy_loss: "CEL"
        epochs:
          batch_size: 16
          learning_epochs: 1
      optimizer:
        optimizer_choice: "Adam"
      scheduler:
        starting_lr: 0.001
        boundaries: [1000]
        gamma: 0.1
      search:
        simulation:
          mcts_simulations: 8
          keep_subtree: false
        uct:
          pb_c_base: 10000
          pb_c_init: 1.15
        exploration:
          number_of_softmax_moves: 3
          epsilon_softmax_exploration: 0.04
          epsilon_random_exploration: 0.0
          value_factor: 1.0
          root_exploration_distribution: "dirichlet"
          root_exploration_fraction: 0.25
          root_dist_alpha: 0.3
          root_dist_beta: 1.0

evaluation:
  training_eval:
    - player: policy
      games_per_player: 2
      interval: 4
  checkpoint_eval:
    - player: mcts
      opponent: policy
      games_per_player: 2
      search_config_path: "test/configs/search_test.yml"
