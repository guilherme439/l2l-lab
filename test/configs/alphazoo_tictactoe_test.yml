name: "_test_alphazoo_tictactoe"

common:
  plot_interval: 1000
  info_interval: 1000
  eval_graph_split: 100
  checkpoint_interval: 5

env:
  name: "tictactoe"
  obs_space_format: "channels_last"
  kwargs: {}

network:
  architecture: "ResNet"
  num_filters: 8
  num_blocks: 2
  hex: false

backend:
  name: "alphazoo"
  continue_training: false
  algorithm:
    name: "alphazero"
    config:
      verbose: false
      running:
        running_mode: "sequential"
        num_gamers: 1
        training_steps: 10
        early_fill_games: 2
        sequential:
          num_games_per_step: 2
      data:
        player_dependent_value: true
      cache:
        enabled: true
        max_size: 500
      learning:
        learning_method: "samples"
        replay_window_size: 300
        value_loss: "SE"
        policy_loss: "CEL"
        samples:
          batch_size: 16
          num_samples: 48
      search:
        simulation:
          mcts_simulations: 8
          keep_subtree: false
        uct:
          pb_c_base: 10000
          pb_c_init: 1.15
        exploration:
          number_of_softmax_moves: 3
          epsilon_softmax_exploration: 0.04
          epsilon_random_exploration: 0.0
          value_factor: 1.0
          root_exploration_distribution: "dirichlet"
          root_exploration_fraction: 0.25
          root_dist_alpha: 0.3
          root_dist_beta: 1.0
      optimizer:
        optimizer_choice: "Adam"
      scheduler:
        starting_lr: 0.001
        boundaries: [1000]
        gamma: 0.1

evaluation:
  training_eval:
    - player: mcts
      games_per_player: 2
      interval: 5
      search_config_path: "test/configs/search_test.yml"
  checkpoint_eval:
    - player: policy
      opponent: mcts
      games_per_player: 2
      search_config_path: "test/configs/search_test.yml"
