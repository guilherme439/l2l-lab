name: "example"

common:
  plot_interval: 35
  info_interval: 100
  eval_graph_split: 500
  checkpoint_interval: 50
  plot_memory: false

env:
  name: "connect_four"
  obs_space_format: "channels_last"
  kwargs: {}

network:
  architecture: "ResNet"
  num_filters: 16
  num_blocks: 4
  hex: false

backend:
  name: "rllib"
  continue_training: false
  # continue_from_iteration: 3000
  algorithm:
    name: "ppo"
    iterations: 1000
    config:
      use_curiosity: false
      curiosity_coeff: 0.05

      num_env_runners: 0
      rollout_fragment_length: 128
      train_batch_size_per_learner: 256
      minibatch_size: 64
      num_epochs: 2
      lr:
        - [0, 0.00004]
        - [512000, 0.00002]
        - [768000, 0.00001]
        - [1024000, 0.000005]
      gamma: 0.999
      entropy_coeff: 0.05
      vf_loss_coeff: 0.5
      clip_param: 0.2
      use_kl_loss: true
      kl_coeff: 0.2
      kl_target: 0.01

      policy:
        use_multiple_policies: true
        number_previous_policies: 2
        main_policy_ratio: 0.5
        random_policy_ratio: 0.3

evaluation:
  training_eval:
    - player: policy
      games_per_player: 50
      interval: 15
  checkpoint_eval:
    - player: policy
      opponent: policy
      games_per_player: 50

reporting:
  enabled: false
  interval: 100
  sample_games_per_eval: 2
