name: "connect_four_ppo"

env:
  name: "connect_four"
  obs_space_format: "channels_last"
  kwargs: {}

algorithm:
  name: "ppo"
  iterations: 1000
  config:
    use_curiosity: false

    num_env_runners: 0
    rollout_fragment_length: 32
    train_batch_size_per_learner: 4096
    minibatch_size: 256
    num_epochs: 2
    lr: 
      - [0,       0.002]
      - [2000000,  0.0001]
      - [10000000, 0.00005]
    gamma: 0.995
    entropy_coeff: 0.02
    vf_loss_coeff: 1.1
    clip_param: 0.25
    use_kl_loss: true
    kl_coeff: 0.2
    kl_target: 0.01

    policy:
      use_multiple_policies: true
      number_previous_policies: 2
      main_policy_ratio: 0.5
      random_policy_ratio: 0.1

network:
  architecture: "MLPNet"
  hidden_layers: 3
  neurons_per_layer: 64
  head_layers: 2


eval_games: 200
eval_interval: 35
eval_vs_previous: true
eval_graph_split: 400
plot_interval: 40
info_interval: 100

checkpoint_interval: 70
continue_training: true

