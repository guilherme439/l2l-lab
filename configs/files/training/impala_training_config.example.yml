name: "impala_example"
debug: false
game_config: "/path/to/config.yml"


algorithm:
  name: "impala"
  iterations: 1000
  config:
    num_env_runners: 0
    rollout_fragment_length: 64
    lr: 0.00002
    gamma: 0.995
    entropy_coeff: 0.05
    vf_loss_coeff: 0.5
    grad_clip: 40.0
    vtrace: true
    vtrace_clip_rho_threshold: 1.0
    vtrace_clip_pg_rho_threshold: 1.0
    num_learners: 1

network:
  architecture: "ResNet"
  num_filters: 16
  num_blocks: 4
  hex: true


eval_vs_previous: true
eval_games: 100
eval_interval: 15
plot_interval: 35
checkpoint_interval: 50
continue_training: false

