name: "tictactoe_example"

env:
  name: "tictactoe"
  obs_space_format: "channels_last"
  kwargs: {}

algorithm:
  name: "ppo"
  iterations: 2000
  config:
    use_curiosity: true
    curiosity_coeff: 0.6

    num_env_runners: 0
    rollout_fragment_length: 16
    train_batch_size_per_learner: 4096
    minibatch_size: 128
    num_epochs: 2
    lr: 
      - [     0, 0.00001]
      - [100000, 0.001]
      - [200000, 0.00001]
      - [300000, 0.001]
      - [500000, 0.00001]
    gamma: 0.9
    entropy_coeff: 0.05
    vf_loss_coeff: 2.5
    clip_param: 0.3
    use_kl_loss: true
    kl_coeff: 0.1
    kl_target: 0.05

network:
  architecture: "ResNet"
  num_filters: 32
  num_blocks: 3
  hex: false


eval_games: 100
eval_interval: 65
eval_vs_previous: true
eval_graph_split: 500
plot_interval: 85

checkpoint_interval: 100
continue_training: false
info_interval: 140
