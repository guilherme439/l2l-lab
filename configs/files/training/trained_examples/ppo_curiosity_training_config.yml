name: "curiosity_1"
debug: false
game_config: "/home/guilherme/Documents/Code/Personal/RL-SCS/RL-SCS/src/example_configurations/mirrored_config_5.yml"


algorithm:
  name: "ppo"
  iterations: 5000
  config:
    use_curiosity: true
    curiosity_coeff: 0.05

    num_env_runners: 0
    rollout_fragment_length: 128
    train_batch_size_per_learner: 256
    minibatch_size: 16
    num_epochs: 1
    lr: 
      - [0, 0.00004]
      - [512000, 0.00002]
      - [768000, 0.00001]
      - [1024000, 0.000002]

    gamma: 0.999
    entropy_coeff: 0.005
    vf_loss_coeff: 1.2
    clip_param: 0.45
    use_kl_loss: true
    kl_coeff: 0.05
    kl_target: 0.15

network:
  architecture: "ResNet"
  num_filters: 32
  num_blocks: 4
  hex: false


eval_games: 100
eval_interval: 40
eval_vs_previous: true
eval_graph_split: 500
plot_interval: 45

checkpoint_interval: 100
continue_training: true
# continue_from_iteration: 3000
stop_on_nan: true
info_interval: 150
